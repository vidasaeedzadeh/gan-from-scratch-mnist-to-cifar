# Phase 1 — Vanilla GAN Hyperparameters

model:
  latent_dim: 100          # Size of the noise vector (z)
  image_size: 28           # MNIST image size
  channels: 1              # Grayscale

training:
  epochs: 50
  batch_size: 128
  lr: 0.0002               # Learning rate for both G and D
  beta1: 0.5               # Adam beta1 (standard for GANs)
  beta2: 0.999             # Adam beta2

logging:
  sample_interval: 5       # Save sample images every N epochs
  output_dir: "../outputs/phase1"
  checkpoint_dir: "../checkpoints/phase1"

data:
  root: "../data"
